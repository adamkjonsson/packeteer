line-length = 100
indent-width = 4

[format]
indent-style = "space"
docstring-code-format = true
docstring-code-line-length = 30

[lint]
select = [
    "B",
    "C4",
    "D",
    "E",
    "F",
    "I",
    "W",
    "ANN",
    "BLE001",
    "NPY2",
    "PLE",
    "PLR",
    "PLW",
    "SIM",
    "SLF001",
    "RET5",
]

ignore = [
    "ANN401",
    "D100",
    "D104",
    "D105",
    "D107",
    "PLR0914",
    "PLR0916",
    "I001",
    "PLR2004",
]

[lint.per-file-ignores]
"*_test.py" = ["D1", "ANN201", "SLF001"]
"test_*.py" = ["D1", "ANN201", "SLF001"]

[lint.flake8-annotations]
mypy-init-return = true
suppress-dummy-args = true

[lint.pylint]
max-args = 18
max-branches = 20
max-nested-blocks = 7
max-public-methods = 30
max-returns = 12
max-statements = 200
